<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - Hệ thống Live AI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #3d7cff;
            --primary-hover: #1e60eb;
            --bg-body: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            --text-dark: #0f172a;
            --text-light: #f8fafc;
            --font-main: 'Outfit', sans-serif;
            --font-cyber: 'Orbitron', sans-serif;
        }

        body {
            font-family: var(--font-main);
            background: var(--bg-body);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: var(--text-light);
            overflow: hidden;
            position: relative;
        }

        /* Beautiful glowing background blobs */
        body::before, body::after {
            content: '';
            position: absolute;
            width: 300px;
            height: 300px;
            border-radius: 50%;
            background: rgba(61, 124, 255, 0.15);
            filter: blur(80px);
            z-index: 0;
            animation: float-blobs 12s ease-in-out infinite alternate;
        }

        body::before {
            top: 15%;
            left: 20%;
        }

        body::after {
            bottom: 15%;
            right: 20%;
            background: rgba(254, 44, 85, 0.15);
            animation-delay: -6s;
        }

        @keyframes float-blobs {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(40px, 30px) scale(1.2); }
        }

        .login-card {
            width: 100%;
            max-width: 420px;
            background: rgba(30, 41, 59, 0.7); /* Translucent dark slate */
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            padding: 40px;
            box-sizing: border-box;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            z-index: 1;
            transform: translateY(0);
            animation: fade-in-up 0.6s cubic-bezier(0.25, 0.8, 0.25, 1) forwards;
        }

        @keyframes fade-in-up {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .logo-title {
            text-align: center;
            font-family: var(--font-cyber);
            font-size: 26px;
            font-weight: 900;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            background: linear-gradient(90deg, #3d7cff, #a855f7, #fe2c55);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 30px;
            text-shadow: 0 4px 12px rgba(61, 124, 255, 0.15);
        }

        .form-group {
            margin-bottom: 22px;
            display: flex;
            flex-direction: column;
        }

        label {
            font-size: 13px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            color: #94a3b8;
            margin-bottom: 8px;
        }

        input {
            padding: 14px 16px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(15, 23, 42, 0.6);
            color: #ffffff;
            font-size: 15px;
            outline: none;
            font-family: var(--font-main);
            transition: all 0.3s ease;
        }

        input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(61, 124, 255, 0.25);
            background: rgba(15, 23, 42, 0.8);
        }

        .error-message {
            background: rgba(254, 44, 85, 0.1);
            border: 1px solid rgba(254, 44, 85, 0.2);
            color: #fda4af;
            padding: 12px;
            border-radius: 10px;
            font-size: 13.5px;
            margin-bottom: 20px;
            text-align: center;
            display: none;
            animation: shake 0.4s ease;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-6px); }
            75% { transform: translateX(6px); }
        }

        button {
            width: 100%;
            padding: 14px;
            font-size: 15px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            color: #ffffff;
            background: var(--primary);
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-family: var(--font-main);
            outline: none;
            position: relative;
            overflow: hidden;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            box-shadow: 0 4px 12px rgba(61, 124, 255, 0.3);
            border-bottom: 3px solid #1e40af;
        }

        button:hover {
            background: var(--primary-hover);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(61, 124, 255, 0.4);
        }

        button:active {
            transform: translateY(1px);
            border-bottom-width: 1px;
        }

        button::after {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: all 0.5s ease;
        }

        button:hover::after {
            left: 100%;
        }

        .footer-note {
            text-align: center;
            font-size: 12.5px;
            color: #64748b;
            margin-top: 25px;
        }
        
        .footer-note a {
            color: var(--primary);
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="logo-title">S LIVE AI</div>
        
        <div id="error-box" class="error-message"></div>

        <form id="login-form">
            <div class="form-group">
                <label for="username">Tài khoản</label>
                <input type="text" id="username" name="username" placeholder="Nhập tài khoản admin" required autocomplete="username">
            </div>
            
            <div class="form-group">
                <label for="password">Mật khẩu</label>
                <input type="password" id="password" name="password" placeholder="Nhập mật khẩu" required autocomplete="current-password">
            </div>
            
            <button type="submit" id="submit-btn">Đăng nhập</button>
        </form>
        
        <div class="footer-note">
            Đăng nhập để quản trị hệ thống phát sinh kịch bản livestream.
        </div>
    </div>

    <script>
        const form = document.getElementById('login-form');
        const errorBox = document.getElementById('error-box');

        // Check query parameters for error message
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.has('error')) {
            errorBox.textContent = urlParams.get('error');
            errorBox.style.display = 'block';
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            errorBox.style.display = 'none';

            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;

            try {
                const response = await fetch('/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const data = await response.json();
                if (response.ok && data.success) {
                    // Redirect to dashboard/home page
                    window.location.href = '/';
                } else {
                    errorBox.textContent = data.error || 'Sai tài khoản hoặc mật khẩu.';
                    errorBox.style.display = 'block';
                    // Re-trigger animation shake
                    errorBox.style.animation = 'none';
                    errorBox.offsetHeight; /* trigger reflow */
                    errorBox.style.animation = null;
                }
            } catch (err) {
                errorBox.textContent = 'Lỗi kết nối đến server.';
                errorBox.style.display = 'block';
            }
        });
    </script>
</body>
</html>
